<!DOCTYPE html>
<html>
<head>
	<title>Başka bir siteye yönlendirme örneği</title>
	<meta http-equiv="refresh" content="7;url=http://www.emreuctepe.com" />
	<style>
		body{
			display:flex;
			flex-direction:column;
			justify-content:center;
			align-content:center;
			background-color:#000;
			color:#ddd;
    		}
		    h1{
		      font-size:3rem;
		      color:#eee;
		    }
		#bar{
		      font-size:2rem;
		      color:#ddd;
		}
		.countdown {
			font-size: 36px;
			text-align: center;
			margin-top: 50px;
		}
	</style>
</head>
<body>
	<h1>emreuctepe.com</h1>
 	<p id="bar">########.. 80% tamamlandı.</p>
	<p class="countdown"> <span id="countdown">7</span> saniye sonra -> Instagram</p>
	
	<script>
		var count = 7;
		setInterval(function() {
			count--;
			document.getElementById("countdown").textContent = count;
		}, 1000);
	</script>
</body>
</html>
